name: Release Tauri Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "tauri-v*"

permissions:
  contents: write

concurrency:
  group: release-tauri-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.id }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: mac-arm64
            os: macos-14
            target: aarch64-apple-darwin
            bundle: dmg
          - id: mac-x64
            os: macos-13
            target: x86_64-apple-darwin
            bundle: dmg
          - id: win-x64
            os: windows-latest
            target: x86_64-ppc-windows-msvc
            bundle: nsis
          - id: win-arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundle: nsis
          - id: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: appimage
          - id: linux-arm64
            os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            bundle: appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust stable
        run: rustup default stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0.0'

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Tauri v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

  build-macos-app:
    name: Build macOS App Bundle
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0.0'

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build macOS app bundle
        working-directory: apps/tauri-desktop
        run: cargo tauri build --bundles app

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: apps/tauri-desktop/src-tauri/target/release/bundle/macos/*.app
