name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.id }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: mac-arm64
            os: macos-14
            rust_target: aarch64-apple-darwin
            build_args: --mac --arm64
          - id: win-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            build_args: --win --x64
          - id: win-arm64
            os: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
            build_args: --win --arm64
          - id: win-ia32
            os: windows-latest
            rust_target: i686-pc-windows-msvc
            build_args: --win --ia32
          - id: linux-x64
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            build_args: --linux --x64
          - id: linux-arm64
            os: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            build_args: --linux --arm64

    env:
      RUST_TARGET: ${{ matrix.rust_target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web export for Electron tests
        working-directory: apps/web
        run: npm run build

      - name: Run Electron tests
        working-directory: apps/web
        run: npm run test:electron

      - name: Build desktop artifacts (no publish)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && github.event_name != 'workflow_dispatch' }}
        working-directory: apps/web
        run: npm run build:desktop -- ${{ matrix.build_args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build desktop artifacts for release
        if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
        working-directory: apps/web
        run: npm run build:desktop -- ${{ matrix.build_args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Ensure GitHub release exists
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "$TAG" --title "$TAG" --generate-notes || gh release view "$TAG" >/dev/null

      - name: Upload installer packages to GitHub release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        working-directory: apps/web
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          MATRIX_ID: ${{ matrix.id }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.exe
            dist-electron/*.AppImage
          )

          if [ ${#assets[@]} -eq 0 ]; then
            echo "No installer packages found in dist-electron for $TAG"
            exit 1
          fi

          upload_assets=()
          for asset in "${assets[@]}"; do
            filename="$(basename "$asset")"
            extension="${filename##*.}"
            stem="${filename%.*}"
            renamed="dist-electron/${stem}-${MATRIX_ID}.${extension}"
            cp "$asset" "$renamed"
            upload_assets+=("$renamed")
          done

          gh release upload "$TAG" "${upload_assets[@]}" --clobber

      - name: Upload desktop artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.id }}
          path: |
            apps/web/dist-electron/**/*.dmg
            apps/web/dist-electron/**/*.zip
            apps/web/dist-electron/**/*.exe
            apps/web/dist-electron/**/*.AppImage
            apps/web/dist-electron/**/*.blockmap
            apps/web/dist-electron/**/*.yml
